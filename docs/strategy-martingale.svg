<svg xmlns="http://www.w3.org/2000/svg" width="600" height="140" viewBox="0 0 600 140">
  <rect x="0" y="0" width="600" height="130" fill="#fafafa" rx="4"/>
  <text x="300" y="18" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-family="sans-serif">马丁格尔策略 K 线 — 先跌后涨，逐层倍投加仓，反弹一次平仓</text>
  <line x1="50" y1="115" x2="570" y2="115" stroke="#ccc" stroke-width="0.5"/>
  <text x="52" y="127" font-size="8" fill="#999" font-family="sans-serif">t0</text>
  <text x="135" y="127" font-size="8" fill="#999" font-family="sans-serif">t1</text>
  <text x="220" y="127" font-size="8" fill="#999" font-family="sans-serif">t2</text>
  <text x="305" y="127" font-size="8" fill="#999" font-family="sans-serif">t3</text>
  <text x="390" y="127" font-size="8" fill="#999" font-family="sans-serif">t4</text>
  <text x="475" y="127" font-size="8" fill="#999" font-family="sans-serif">t5</text>
  <text x="555" y="127" font-size="8" fill="#999" font-family="sans-serif">t6</text>
  <polyline points="50,105 130,108 220,112 305,115 390,113 475,108 560,100" fill="none" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- t0 入场 -->
  <line x1="75" y1="36" x2="75" y2="46" stroke="#e94560" stroke-width="2"/>
  <rect x="71" y="40" width="8" height="10" fill="#e94560" opacity="0.7"/>
  <text x="65" y="32" font-size="8" fill="#e94560" font-family="sans-serif">$100</text>
  <polygon points="75,46 70,52 80,52" fill="#e94560" opacity="0.7"/>
  <text x="80" y="56" font-size="7" fill="#e94560" font-family="sans-serif">入场 $100</text>
  <!-- t1 第一次加仓 -->
  <rect x="148" y="48" width="3" height="30" fill="#e94560" opacity="0.3"/>
  <line x1="150" y1="42" x2="150" y2="58" stroke="#e94560" stroke-width="2"/>
  <rect x="146" y="46" width="8" height="12" fill="#e94560" opacity="0.7"/>
  <text x="140" y="38" font-size="8" fill="#e94560" font-family="sans-serif">$96</text>
  <polygon points="150,58 145,64 155,64" fill="#e94560" opacity="0.7"/>
  <text x="155" y="68" font-size="7" fill="#e94560" font-family="sans-serif">加仓 $200</text>
  <!-- t2 第二次加仓 -->
  <line x1="235" y1="55" x2="235" y2="75" stroke="#e94560" stroke-width="2"/>
  <rect x="231" y="60" width="8" height="12" fill="#e94560" opacity="0.7"/>
  <text x="225" y="54" font-size="8" fill="#e94560" font-family="sans-serif">$92</text>
  <polygon points="235,75 230,81 240,81" fill="#e94560" opacity="0.7"/>
  <text x="240" y="85" font-size="7" fill="#e94560" font-family="sans-serif">加仓 $400</text>
  <!-- t3 第三次加仓 -->
  <line x1="320" y1="65" x2="320" y2="90" stroke="#e94560" stroke-width="2"/>
  <rect x="316" y="70" width="8" height="15" fill="#e94560" opacity="0.7"/>
  <text x="310" y="64" font-size="8" fill="#e94560" font-family="sans-serif">$88</text>
  <polygon points="320,90 315,96 325,96" fill="#e94560" opacity="0.7"/>
  <text x="325" y="100" font-size="7" fill="#e94560" font-family="sans-serif">加仓 $800</text>
  <!-- t4 等待反弹 -->
  <line x1="405" y1="58" x2="405" y2="78" stroke="#666" stroke-width="1.5"/>
  <rect x="401" y="62" width="8" height="12" fill="#999" opacity="0.4"/>
  <text x="395" y="56" font-size="8" fill="#999" font-family="sans-serif">$95</text>
  <!-- 成本线 -->
  <line x1="50" y1="92" x2="570" y2="92" stroke="#0f3460" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="460" y="90" font-size="8" fill="#0f3460" font-family="sans-serif">均价 $94</text>
  <!-- t5 止盈 -->
  <line x1="490" y1="22" x2="490" y2="38" stroke="#0f3460" stroke-width="2"/>
  <rect x="486" y="26" width="8" height="8" fill="#0f3460" opacity="0.7"/>
  <text x="480" y="20" font-size="8" fill="#0f3460" font-family="sans-serif">$102</text>
  <polygon points="490,22 483,15 497,15" fill="#0f3460" opacity="0.7"/>
  <text x="470" y="10" font-size="7" fill="#0f3460" font-family="sans-serif">全仓止盈!</text>
  <!-- t6 -->
  <line x1="560" y1="35" x2="560" y2="45" stroke="#999" stroke-width="1"/>
  <rect x="556" y="38" width="8" height="5" fill="#999" opacity="0.3"/>
</svg>