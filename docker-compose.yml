services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradex
    ports:
      - "80:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__Sqlite=Data Source=/data/tradex.db
      - Jwt__Secret=${JWT_SECRET:?JWT_SECRET is required}
      - IoTDb__Host=iotdb
    volumes:
      - tradex-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    depends_on:
      iotdb:
        condition: service_healthy

  iotdb:
    image: apache/iotdb:1.3.3-standalone
    container_name: tradex-iotdb
    ports:
      - "6667:6667"
      - "8181:8181"
    volumes:
      - iotdb-data:/iotdb/data
      - iotdb-wal:/iotdb/wal
    environment:
      - cn_iotdb_rest_service_enable=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  tradex-data:
  iotdb-data:
  iotdb-wal:
