services:
  backend:
    build:
      context: ./backend
      dockerfile: TradeX.Api/Dockerfile
    container_name: tradex-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Sqlite=Data Source=/data/tradex.db
      - Jwt__Secret=${JWT_SECRET:?JWT_SECRET is required}
    volumes:
      - tradex-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradex-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  iotdb:
    image: apache/iotdb:1.3.3-standalone
    container_name: tradex-iotdb
    ports:
      - "6667:6667"
      - "8181:8181"
    volumes:
      - iotdb-data:/iotdb/data
      - iotdb-wal:/iotdb/wal
    environment:
      - cn_iotdb_rest_service_enable=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  tradex-data:
  iotdb-data:
  iotdb-wal:
