services:
  postgres:
    image: postgres:16-alpine
    container_name: tradex-postgres
    environment:
      - POSTGRES_DB=tradex
      - POSTGRES_USER=tradex
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    command:
      - -c
      - max_connections=200
    volumes:
      - tradex-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradex -d tradex"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: tradex-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    # 如果设置了 REDIS_PASSWORD 环境变量，则启用密码认证
    command: >
      sh -c 'exec redis-server --appendonly no --save "" ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}'
    healthcheck:
      test: redis-cli ${REDIS_PASSWORD:+--no-auth-warning -a $REDIS_PASSWORD} ping
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: tradex-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=tradex;Username=tradex;Password=${POSTGRES_PASSWORD};
      - Redis__ConnectionString=redis:6379${REDIS_PASSWORD:+,password=${REDIS_PASSWORD}}
      - Jwt__SecretKey=${JWT_SECRET:?JWT_SECRET is required}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: tradex-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=tradex;Username=tradex;Password=${POSTGRES_PASSWORD};
      - Redis__ConnectionString=redis:6379${REDIS_PASSWORD:+,password=${REDIS_PASSWORD}}
      - Otel__PrometheusListener=http://+:9464/
    # Worker 不对外暴露端口；Prometheus 在内部网络 scrape worker:9464/metrics
    expose:
      - "9464"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9464/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  backtest-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: backtest-worker
    container_name: tradex-backtest-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=tradex;Username=tradex;Password=${POSTGRES_PASSWORD};
      - Redis__ConnectionString=redis:6379${REDIS_PASSWORD:+,password=${REDIS_PASSWORD}}
      - Otel__PrometheusListener=http://+:9465/
    expose:
      - "9465"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9465/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  tradex-postgres-data:
