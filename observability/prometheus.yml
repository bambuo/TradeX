global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: tradex
    env: prod

scrape_configs:
  - job_name: tradex-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:80
        labels:
          service: tradex-api

  - job_name: tradex-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9464
        labels:
          service: tradex-worker
